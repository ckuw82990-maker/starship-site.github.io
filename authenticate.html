<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>starship - authentication</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/navbar.css" />

 
  <style>
    :root{
      --bg1: #05020a;
      --card-bg: rgba(255,255,255,0.04);
      --accent: #8a2be2;
      --glass-border: rgba(255,255,255,0.08);
      --glass-accent: rgba(138,43,226,0.14);
    }
    *{ box-sizing: border-box; }
    html,body{
      height:100%;
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      color:#fff;
      background:
        radial-gradient(800px 400px at 10% 10%, rgba(138, 43, 226, 0.08), transparent 10%),
        linear-gradient(180deg, #02010a 0%, #03020f 60%) !important;
    }

    /* Wrapper: center the card visually, but allow page scroll if card content > viewport */
    .card-wrapper {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 18px;
    }

    /* Card: internal scroll if tall; max-height prevents it from blowing up viewport */
    .card {
      width: 100%;
      max-width: 420px;
      max-height: calc(100vh - 56px);
      padding: 28px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px) saturate(120%);
      box-shadow: 0 12px 40px rgba(138, 43, 226, 0.07), inset 0 1px 0 rgba(255,255,255,0.02);
      overflow: auto;
      position: relative;
    }

    .card.animated { animation: dropIn .38s cubic-bezier(.2,.9,.3,1); }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(10px) scale(.995); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ONLY the active outer screen contributes to card height.
       This prevents multiple screens stacking and making the card huge. */
    .screen { display: none; }
    .screen.active { display: block; }

    h1 { font-size: 28px; margin: 0 0 10px; text-align:center; }
    h2 { font-size: 18px; margin: 0 0 12px; text-align:center; color:#ddd; }

    .row { display:flex; gap:10px; }

    button.btn{
      width:100%;
      padding:12px 14px;
      border-radius:10px;
      border:none;
      background: linear-gradient(180deg, var(--accent), #6e21cc);
      color:#fff;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(138,43,226,0.18);
      transition: transform .12s ease, filter .12s;
    }
    button.btn:hover { transform: translateY(-3px) scale(1.01); filter: brightness(1.02); }
    button.btn:active { transform: translateY(1px); }

    .muted { color:#bfb6d9; font-size:13px; text-align:center; margin-top:10px; }
    .small { font-size:13px; color:#cfc9e7; text-align:center; margin-top:8px; }

    .hidden { display: none !important; }

    .input { position: relative; margin: 10px 0; transition: transform .18s ease; }
    .input input, .input select {
      width:100%;
      padding: 12px 14px 12px 42px;
      border-radius:10px;
      border:1px solid transparent;
      background: rgba(255,255,255,0.04);
      color:#fff;
      outline:none;
      font-size:14px;
      transition: box-shadow .18s, background .18s, border-color .18s;
      -webkit-appearance:none;
    }
    .input input::placeholder { color: rgba(255,255,255,0.45); }
    .input input:focus {
      background: rgba(255,255,255,0.05);
      box-shadow: 0 6px 18px var(--glass-accent);
      border-color: rgba(138,43,226,0.25);
      transform: translateY(-2px);
    }
    .input i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--accent); opacity:.95; }

    .link { display:block; color:var(--accent); margin-top:10px; font-size:14px; cursor:pointer; text-align:center; }

    /* Turnstile containers — use block layout and margin auto */
    #turnstile-widget,
    #turnstile-widget-reset,
    #turnstile-login {
      display:block;
      margin:12px auto 0;
    }
    #turnstile-widget.hidden,
    #turnstile-widget-reset.hidden,
    #turnstile-login.hidden { display:none !important; }

    /* Toasts */
    #toasts { position: fixed; right:18px; top:18px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
    .toast {
      padding:10px 14px; border-radius:10px; background: rgba(20,20,22,0.95); color:#fff;
      box-shadow:0 8px 20px rgba(0,0,0,0.6); min-width:180px; font-weight:600; border-left:4px solid var(--accent);
      opacity:0; transform: translateY(-6px); animation: toastIn .18s forwards;
    }
    .toast.fail { border-left-color: #ff5c6c; }
    @keyframes toastIn { to { opacity:1; transform: translateY(0); } }

    /* small responsive tweak */
    @media (max-width:420px){
      .card { padding:20px; }
    }
  </style>
</head>
<body>

    <!-- Navigation Bar -->
    <div id="navbar"></div>
    <script type="module" src="/javascript/navbar.js"></script>

  <div class="card-wrapper">
    <main class="card animated" id="card" role="main" aria-live="polite">

      <!-- WELCOME -->
      <section id="welcome-screen" class="screen active">
        <h1>Welcome!</h1>
        <div class="row" style="margin-top:18px">
          <button class="btn" onclick="showLogin()">Login</button>
          <button class="btn" onclick="showSignup()">Sign Up</button>
        </div>
        <p class="muted">starship - wow the login page finally works?! 🥀</p>
      </section>

      <!-- LOGIN (outer) -->
      <section id="login-screen" class="screen">
        <h2>Login</h2>

        <!-- MAGIC LINK MODE (default inside login) -->
        <div id="login-magic">
          <div class="input">
            <i class="fa-solid fa-envelope"></i>
            <input id="login-email" type="email" placeholder="Email" autocomplete="email" />
          </div>
          <button class="btn" onclick="loginMagic()">
            <i class="fa-regular fa-envelope" style="margin-right:8px"></i> Continue (Magic Link)
          </button>

          <div class="small">or</div>

          <!-- switches to password mode (renders its own turnstile) -->
          <button class="btn" style="margin-top:10px;" onclick="showPasswordMode()">
            <i class="fa-solid fa-key" style="margin-right:8px"></i> Use password
          </button>

          <div class="link" onclick="showWelcome()">Back</div>
          <div class="link" onclick="showReset()">Forgot password?</div>
        </div>

        <!-- PASSWORD MODE inside login: toggled via .hidden so it doesn't affect outer card sizing -->
        <div id="login-password" class="hidden" style="margin-top:12px;">
          <div class="input">
            <i class="fa-solid fa-envelope"></i>
            <input id="login-pw-email" type="email" placeholder="Email" autocomplete="email" />
          </div>
          <div class="input">
            <i class="fa-solid fa-lock"></i>
            <input id="login-pw-password" type="password" placeholder="Password" />
          </div>

          <!-- NEW: login-specific Turnstile container.
               We render a widget here when entering password mode and require its token. -->
          <div id="turnstile-login" class="hidden" aria-hidden="true"></div>

          <button class="btn" onclick="loginPassword()">Continue</button>
          <div class="small">or</div>
          <button class="btn" style="margin-top:10px" onclick="showMagicMode()">
            <i class="fa-regular fa-envelope" style="margin-right:8px"></i>Use Magic Link
          </button>
          <div class="link" onclick="showWelcome()">Back</div>
        </div>
      </section>

      <!-- SIGNUP -->
      <section id="signup-screen" class="screen">
        <h2>Create Account</h2>
        <div class="input">
          <i class="fa-solid fa-user"></i>
          <input id="su-username" type="text" placeholder="Username" autocomplete="username" />
        </div>
        <div class="input">
          <i class="fa-solid fa-envelope"></i>
          <input id="su-email" type="email" placeholder="Email" autocomplete="email" />
        </div>
        <div class="input">
          <i class="fa-solid fa-lock"></i>
          <input id="su-password" type="password" placeholder="Password (min 8 chars)" />
        </div>
        <div class="input">
          <i class="fa-solid fa-cake-candles"></i>
          <input id="su-birthday" type="date" />
        </div>

        <!-- signup turnstile rendered on-demand into this container -->
        <div id="turnstile-widget" class="hidden" aria-hidden="true"></div>

        <button class="btn" onclick="signup()">Sign Up</button>
        <div class="link" onclick="showWelcome()">Back</div>
        <div class="small">You must be 13+ to use Starship</div>
      </section>

      <!-- RESET -->
      <section id="reset-screen" class="screen">
        <h2>Reset Password</h2>
        <div class="input">
          <i class="fa-regular fa-envelope"></i>
          <input id="reset-email" type="email" placeholder="Email" />
        </div>
        <div id="turnstile-widget-reset" class="hidden" aria-hidden="true"></div>
        <button class="btn" onclick="resetPassword()">Send Reset Link</button>
        <div class="link" onclick="showWelcome()">Back</div>
      </section>

    </main>
  </div>

  <div id="toasts" aria-live="polite"></div>

  <!-- Explicit render param so we control when the widget appears -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" defer></script>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // ====== CONFIG - keep your values ======
    const SUPABASE_URL = 'https://jbekjmsruiadbhaydlbt.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpiZWtqbXNydWlhZGJoYXlkbGJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgzOTQ2NTgsImV4cCI6MjA2Mzk3MDY1OH0.5Oku6Ug-UH2voQhLFGNt9a_4wJQlAHRaFwTeQRyjTSY';
    const TURNSTILE_SITE_KEY = "0x4AAAAAABnpTjrdDgkMZ8Nr";
    // =======================================

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM refs
    const screens = {
      welcome: document.getElementById('welcome-screen'),
      login: document.getElementById('login-screen'),
      signup: document.getElementById('signup-screen'),
      reset: document.getElementById('reset-screen')
    };
    const loginMagicDiv = document.getElementById('login-magic');
    const loginPwDiv = document.getElementById('login-password');
    const cardEl = document.getElementById('card');

    const turnstileMainSelector = '#turnstile-widget';
    const turnstileResetSelector = '#turnstile-widget-reset';
    const turnstileLoginSelector = '#turnstile-login';

    // Turnstile state (single widget that we move/clean up)
    let widgetId = null;
    let currentContainer = null;
    let captchaToken = null;
    let turnstileReady = false;

    // Simple toast helper
    function showToast(text, ok = true, ms = 4200){
      const toast = document.createElement('div');
      toast.className = 'toast' + (ok ? '' : ' fail');
      toast.textContent = text;
      document.getElementById('toasts').appendChild(toast);
      setTimeout(()=> toast.remove(), ms);
    }

    // Re-trigger card animation
    function triggerCardAnimation(){
      cardEl.classList.remove('animated');
      void cardEl.offsetWidth;
      cardEl.classList.add('animated');
    }

    // Set the active top-level screen (only one .screen is displayed at a time)
    function setActiveScreen(id){
      Object.values(screens).forEach(s => s.classList.remove('active'));
      if (screens[id]) screens[id].classList.add('active');

      // reset inner mode when entering login
      if (id === 'login') showMagicMode();

      triggerCardAnimation();

      // Hide captcha containers when leaving their screens to keep widget moving predictable
      if (id !== 'signup') document.querySelector(turnstileMainSelector)?.classList.add('hidden');
      if (id !== 'reset') document.querySelector(turnstileResetSelector)?.classList.add('hidden');
      if (id !== 'login') document.querySelector(turnstileLoginSelector)?.classList.add('hidden');

      // Render widget only when necessary (on entering those screens)
      if (id === 'signup') ensureTurnstile(turnstileMainSelector);
      if (id === 'reset') ensureTurnstile(turnstileResetSelector);
      if (id === 'login') {
        // don't auto-render the login widget unless user opens password mode.
        // we still ensure the signup/reset widgets are not visible.
      }
    }

    // Screen helpers
    function showWelcome(){ setActiveScreen('welcome'); }
    function showLogin(){ setActiveScreen('login'); }
    function showSignup(){ setActiveScreen('signup'); }
    function showReset(){ setActiveScreen('reset'); }

    // Inner login mode toggles (these are NOT outer screens — they don't change card height)
    function showPasswordMode(){
      // show password mode and render login-specific captcha
      loginMagicDiv.classList.add('hidden');
      loginPwDiv.classList.remove('hidden');
      setTimeout(()=> document.getElementById('login-pw-email')?.focus(), 50);

      // render login captcha so it's ready when user solves it
      ensureTurnstile(turnstileLoginSelector).catch((e)=> {
        console.warn('login turnstile init failed', e);
      });
    }
    function showMagicMode(){
      loginMagicDiv.classList.remove('hidden');
      loginPwDiv.classList.add('hidden');
      setTimeout(()=> document.getElementById('login-email')?.focus(), 50);
    }

    // Wait for Turnstile script to expose API
    function waitForTurnstileReady(timeout = 6000){
      return new Promise((resolve, reject) => {
        if (turnstileReady && window.turnstile && typeof window.turnstile.render === 'function') {
          return resolve(true);
        }
        const start = Date.now();
        (function check(){
          if (window.turnstile && typeof window.turnstile.render === 'function') {
            turnstileReady = true;
            return resolve(true);
          }
          if (Date.now() - start > timeout) return reject(new Error('Turnstile did not load'));
          setTimeout(check, 120);
        })();
      });
    }

    // Render a Turnstile widget into a container. We try to reuse/remove previous widget cleanly.
    async function renderWidgetInto(containerSelector){
      await waitForTurnstileReady();
      const container = document.querySelector(containerSelector);
      if (!container) throw new Error('Turnstile container not found: ' + containerSelector);

      // show container
      container.classList.remove('hidden');

      // if already rendered in same place: reset & return
      if (widgetId !== null && currentContainer === containerSelector) {
        try { window.turnstile.reset(widgetId); } catch(e){/*ignore*/ }
        captchaToken = null;
        return widgetId;
      }

      // remove previous widget if it exists somewhere else
      if (widgetId !== null && currentContainer && currentContainer !== containerSelector) {
        try {
          if (typeof window.turnstile.remove === 'function') {
            window.turnstile.remove(widgetId);
          } else {
            const old = document.querySelector(currentContainer);
            if (old) old.innerHTML = '';
          }
        } catch(e){ console.warn('turnstile remove fallback failed', e); }
        widgetId = null;
        captchaToken = null;
        currentContainer = null;
      }

      widgetId = window.turnstile.render(containerSelector, {
        sitekey: TURNSTILE_SITE_KEY,
        theme: 'dark',
        callback: (token) => { captchaToken = token; },
        'error-callback': () => { showToast('Turnstile error', false); captchaToken = null; },
        'expired-callback': () => { captchaToken = null; }
      });

      currentContainer = containerSelector;
      return widgetId;
    }

    async function ensureTurnstile(containerSelector){
      try {
        await renderWidgetInto(containerSelector);
      } catch (e) {
        console.warn('ensureTurnstile failed', e);
        showToast('Turnstile failed to load', false);
      }
    }

    function getCaptchaToken(){
      try {
        if (widgetId !== null && window.turnstile && typeof window.turnstile.getResponse === 'function') {
          const t = window.turnstile.getResponse(widgetId);
          return t || captchaToken;
        }
      } catch(e){/*ignore*/}
      return captchaToken;
    }

    // Wait until user solved captcha (or timeout) — used before making auth calls that need captcha
    async function requireCaptcha(containerSelector, timeoutMs = 120000){
      await ensureTurnstile(containerSelector);
      const nowToken = getCaptchaToken();
      if (nowToken) return nowToken;

      return new Promise((resolve, reject) => {
        const start = Date.now();
        const check = setInterval(() => {
          const t = getCaptchaToken();
          if (t) { clearInterval(check); resolve(t); }
          else if (Date.now() - start > timeoutMs) { clearInterval(check); reject(new Error('captcha timeout')); }
        }, 300);
      });
    }

    // Cleanup the widget/token and hide the container if requested
    function cleanupCaptcha(hideContainer = true){
      try {
        if (widgetId !== null && window.turnstile && typeof window.turnstile.reset === 'function') {
          window.turnstile.reset(widgetId);
        }
      } catch(e){/*ignore*/}

      if (hideContainer && currentContainer) {
        const el = document.querySelector(currentContainer);
        if (el) el.classList.add('hidden');
      }

      try {
        if (widgetId !== null && window.turnstile && typeof window.turnstile.remove === 'function') {
          window.turnstile.remove(widgetId);
        }
      } catch(e){/*ignore*/}

      widgetId = null;
      currentContainer = null;
      captchaToken = null;
    }

    // ---------- AUTH FLOWS ----------

    // SIGNUP (requires captcha) -- updated to save pendingUsername and run profanity check
    async function signup(){
      const username = document.getElementById('su-username').value.trim();
      const email = document.getElementById('su-email').value.trim();
      const password = document.getElementById('su-password').value;
      const bdayVal = document.getElementById('su-birthday').value;

      if (!username) return showToast('Pick a username', false);
      if (!email) return showToast('Email is required', false);
      if (!password || password.length < 8) return showToast('Password must be 8+ chars', false);
      if (!bdayVal) return showToast('Enter your birthday', false);

      // precise age calc (UTC)
      const birth = new Date(bdayVal + 'T00:00:00Z');
      if (isNaN(birth.getTime())) return showToast('Invalid birthday', false);
      const today = new Date();
      let age = today.getUTCFullYear() - birth.getUTCFullYear();
      const m = today.getUTCMonth() - birth.getUTCMonth();
      if (m < 0 || (m === 0 && today.getUTCDate() < birth.getUTCDate())) age--;
      if (age < 13) return showToast('You must be at least 13 to use Starship', false);

      // ---------- PROFANITY / FILTER CHECK ----------
      try {
        const res = await fetch("https://vector.profanity.dev", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: username }),
        });

        const data = await res.json();
        console.log("Profanity API response:", data);

        // if profanity detected, block signup
        if (data.isProfanity) {
          return showToast('Username blocked by filters', false);
        }
      } catch (err) {
        console.error("Profanity API error:", err);
        return showToast('Could not validate username. Try again later.', false);
      }
      // ---------- end profanity check ----------

      // Save pending username locally (as requested)
      try {
        localStorage.setItem('pendingUsername', username);
      } catch (e) {
        // ignore storage errors, but log
        console.warn('localStorage set failed', e);
      }

      // require captcha for signup
      let token;
      try {
        token = await requireCaptcha(turnstileMainSelector);
      } catch (err) {
        return showToast('Please finish the bot check', false);
      }

      showToast('Signing up...');

      try {
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: { username, birthday: birth.toISOString() },
            captchaToken: token
          }
        });

        cleanupCaptcha(true);

        if (error) {
          console.error('signup error', error);
          return showToast(error.message || 'Signup failed', false);
        }

        showToast('Signup ok! Redirecting...');
        setTimeout(()=> window.location.href = 'auth.html', 700);
      } catch (err) {
        console.error(err);
        cleanupCaptcha(true);
        showToast('Signup error', false);
      }
    }

    // MAGIC LINK (still requires captcha to send)
    async function loginMagic(){
      const email = document.getElementById('login-email').value.trim();
      if (!email) return showToast('Enter your email', false);

      let token;
      try {
        token = await requireCaptcha(turnstileMainSelector);
      } catch (err) {
        return showToast('Please finish the bot check', false);
      }

      showToast('Sending magic link...');

      try {
        const { data, error } = await supabase.auth.signInWithOtp({
          email,
          options: {
            captchaToken: token,
            shouldCreateUser: false
          }
        });

        cleanupCaptcha(true);

        if (error) {
          console.error('magic link error', error);
          return showToast(error.message || 'Magic link failed', false);
        }

        showToast('Magic link sent — check your inbox.');
        // DO NOT redirect here — magic link flow requires user to click link in email.
      } catch (err) {
        console.error(err);
        cleanupCaptcha(true);
        showToast('Error sending magic link', false);
      }
    }

    // PASSWORD LOGIN: require login-specific captcha, then call signInWithPassword including the captcha
    async function loginPassword(){
      const email = document.getElementById('login-pw-email').value.trim();
      const password = document.getElementById('login-pw-password').value;
      if (!email || !password) return showToast('Email + password required', false);

      showToast('Solving bot check (if needed)...');

      // require login-specific captcha token
      let token = null;
      try {
        token = await requireCaptcha(turnstileLoginSelector);
      } catch (err) {
        return showToast('Please finish the bot check', false);
      }

      showToast('Signing in...');

      try {
        // try the modern shape that accepts options
        const credsWithOptions = { email, password, options: { captchaToken: token } };
        try {
          const { data, error } = await supabase.auth.signInWithPassword(credsWithOptions);
          cleanupCaptcha(true);
          if (error) {
            console.error('login error', error);
            // if captcha-related server error, instruct user to retry
            const msg = (error.message || '').toLowerCase();
            if (msg.includes('captcha')) {
              showToast('Captcha verification failed — please complete the bot check again', false);
              ensureTurnstile(turnstileLoginSelector).catch(()=>{});
              return;
            }
            return showToast(error.message || 'Login failed', false);
          }
          showToast('Logged in! Redirecting...');
          setTimeout(()=> window.location.href = 'auth.html', 700);
          return;
        } catch (err) {
          // If calling with options throws (old SDK shape), fall through to fallback call
          console.warn('signInWithPassword with options failed, falling back', err);
        }

        // fallback: call without options (may fail if server requires captcha)
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        cleanupCaptcha(true);
        if (error) {
          console.error('login error fallback', error);
          if ((error.message || '').toLowerCase().includes('captcha')) {
            showToast('Captcha verification failed — please complete the bot check again', false);
            ensureTurnstile(turnstileLoginSelector).catch(()=>{});
            return;
          }
          return showToast(error.message || 'Login failed', false);
        }
        showToast('Logged in! Redirecting...');
        setTimeout(()=> window.location.href = 'auth.html', 700);
      } catch (err) {
        console.error('loginPassword error', err);
        cleanupCaptcha(true);
        const msg = (err && err.message) ? err.message.toLowerCase() : '';
        if (msg.includes('captcha') || msg.includes('500')) {
          showToast('Captcha verification failed — please complete the bot check', false);
          try { if (widgetId !== null && window.turnstile && typeof window.turnstile.reset === 'function') window.turnstile.reset(widgetId); } catch(e){}
          captchaToken = null;
          ensureTurnstile(turnstileLoginSelector).catch(()=>{});
          return;
        }
        showToast('Login error', false);
      }
    }

    // RESET (requires captcha)
    async function resetPassword(){
      const email = document.getElementById('reset-email').value.trim();
      if (!email) return showToast('Enter your email', false);

      let token;
      try {
        token = await requireCaptcha(turnstileResetSelector);
      } catch (err) {
        return showToast('Please finish the bot check', false);
      }

      showToast('Sending reset link...');

      try {
        const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/update-password',
          captchaToken: token
        });

        cleanupCaptcha(true);

        if (error) {
          console.error('reset error', error);
          return showToast(error.message || 'Reset failed', false);
        }
        showToast('Password reset link sent — check your email.');
      } catch (err) {
        console.error(err);
        cleanupCaptcha(true);
        showToast('Reset error', false);
      }
    }

    // expose for inline onclicks
    window.showWelcome = showWelcome;
    window.showLogin = showLogin;
    window.showSignup = showSignup;
    window.showReset = showReset;
    window.showPasswordMode = showPasswordMode;
    window.showMagicMode = showMagicMode;
    window.signup = signup;
    window.loginMagic = loginMagic;
    window.loginPassword = loginPassword;
    window.resetPassword = resetPassword;

    // Init
    (function init(){
      // hide all turnstile containers initially (they are rendered on-demand)
      document.querySelector(turnstileMainSelector)?.classList.add('hidden');
      document.querySelector(turnstileResetSelector)?.classList.add('hidden');
      document.querySelector(turnstileLoginSelector)?.classList.add('hidden');

      // show welcome
      showWelcome();
    })();

  </script>
